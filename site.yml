- name: Debian workstation setup
  hosts: local
  become: true

  vars_files:
    - group_vars/all.yml

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: always

  roles:
    - role: base
      tags: base
    - role: devtools
      tags: devtools
    - role: shell
      tags: shell
    # Li aggiungeremo man mano:
    - role: nvim
      tags: nvim
    - role: gnome
      tags: gnome
    - role: fonts
      tags: fonts
    - role: themes
      tags: themes
