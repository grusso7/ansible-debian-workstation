---
- name: Install GNOME tools and extensions
  ansible.builtin.apt:
    name:
      - ptyxis
      - gnome-tweaks
      - gnome-shell-extension-manager
      - gnome-shell-extension-dashtodock
      - gnome-shell-extension-blur-my-shell
      - gnome-shell-extension-user-theme
      - dconf-cli
      - python3-psutil
    state: present

- name: Set monospace font to UbuntuMono Nerd Font
  community.general.dconf:
    key: "/org/gnome/desktop/interface/monospace-font-name"
    value: "'UbuntuMono Nerd Font 11'"
  become: true
  become_user: "{{ desktop_user }}"

- name: Set cursor theme to Bibata-Modern-Classic
  community.general.dconf:
    key: "/org/gnome/desktop/interface/cursor-theme"
    value: "'Bibata-Modern-Classic'"
  become: true
  become_user: "{{ desktop_user }}"

- name: Enable dash-to-dock, user-theme and blur-my-shell extensions
  community.general.dconf:
    key: "/org/gnome/shell/enabled-extensions"
    value: "['dash-to-dock@micxgx.gmail.com', 'user-theme@gnome-shell-extensions.gcampax.github.com', 'blur-my-shell@aunetx']"
  become: true
  become_user: "{{ desktop_user }}"

# Task opzionale per ptyxis come descritto in `istruzioni.md` se si usa un'estensione come nautilus-open-any-terminal
- name: Attempt to set Nautilus open any terminal (if schema is available)
  ansible.builtin.command: gsettings set com.github.stunkymonkey.nautilus-open-any-terminal terminal ptyxis
  become: true
  become_user: "{{ desktop_user }}"
  ignore_errors: true
